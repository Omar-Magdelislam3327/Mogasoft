<div class="container p-5">
  <div class="title">
    <h2 class="fw-bold text-success">Add New Project</h2>
  </div>
  <form [formGroup]="projectForm" (ngSubmit)="submitProject()">
    <div class="row">
      <div class="col-lg-6">
        <div class="mt-3">
          <label>Name (Arabic)</label>
          <input type="text" class="form-control shadow-none" formControlName="NameAR"
            placeholder="أدخل الاسم بالعربية" />
        </div>
      </div>

      <div class="col-lg-6">
        <div class="mt-3">
          <label>Name (English)</label>
          <input type="text" class="form-control shadow-none" formControlName="NameEN"
            placeholder="Enter name in English" />
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-lg-6">
        <div class="mt-3">
          <label>Description (Arabic)</label>
          <textarea class="form-control shadow-none" formControlName="DescriptionAR"
            placeholder="أدخل الوصف بالعربية"></textarea>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="mt-3">
          <label>Description (English)</label>
          <textarea class="form-control shadow-none" formControlName="DescriptionEN"
            placeholder="Enter description in English"></textarea>
        </div>
      </div>
    </div>

    <div class="mt-3">
      <label>Type</label>
      <select class="form-select shadow-none" formControlName="Type">
        <option value="" selected disabled>Select Type</option>
        <option value="Software">Software</option>
        <option value="Hardware">Hardware</option>
      </select>
    </div>

    <div class="mt-3">
      <label>Category</label>
      <select class="form-select shadow-none" formControlName="Category">
        <option value="" selected disabled>Select Category</option>
        <option value="WebDevelopment">Web Development</option>
        <option value="MobileDevelopment">Mobile Development</option>
        <option value="DigitalMarketing">Digital Marketing</option>
        <option value="Network">Network</option>
        <option value="Computers">Computers</option>
        <option value="SurveliianceSystems">Surveliiance System</option>
        <option value="Copiers">Copiers & Plotters</option>
        <option value="FireFighting">Fire Fighting</option>
        <option value="QueueManagement">Queue Management</option>
      </select>
    </div>


    <div class="mt-3">
      <label>Head Image</label>
      <input type="file" class="form-control shadow-none" (change)="onHeadImageSelected($event)" />
    </div>

    <div class="mt-3">
      <label>Media Files</label>
      <input type="file" class="form-control shadow-none" multiple (change)="onMediaFilesSelected($event)" />
    </div>

    <div class="mt-3">
      <label>Project Steps</label>
      <div formArrayName="ProjectSteps">
        <div *ngFor="let step of projectSteps.controls; let i = index" [formGroupName]="i" class="mb-2">
          <div class="form-group">
            <div class="row p-3 steps">
              <div class="col-lg-6">
                <input type="text" class="form-control shadow-none mt-2" formControlName="titleEN"
                  placeholder="Step Title (English)" />
                <textarea class="form-control shadow-none mt-2" formControlName="descriptionAR"
                  placeholder="Step Description (Arabic)"></textarea>
              </div>
              <div class="col-lg-6">
                <input type="text" class="form-control shadow-none mt-2" formControlName="titleAR"
                  placeholder="Step Title (Arabic)" />
                <textarea class="form-control shadow-none mt-2" formControlName="descriptionEN"
                  placeholder="Step Description (English)"></textarea>

              </div>
              <button type="button" class="btn btn-danger btn-sm" (click)="removeStep(i)">Remove Step</button>
            </div>
          </div>
        </div>
      </div>
      <button type="button" class="btn btn-primary mt-2" (click)="addStep()">Add Step</button>
    </div>

    <div class="col-lg-12 text-center">
      <button type="submit" class="btn-mogasoft-success shadow-none" [disabled]="projectForm.invalid">Add
        Project</button>
      <button type="reset" class="btn-mogasoft-danger ms-3 shadow-none">Reset</button>
    </div>
  </form>
  <hr>
  <div class="row mt-2">
    <div class="col-12">
      <h3 class="fw-bold text-success">Projects List</h3>
    </div>
    <div class="col-md-4 mb-3" *ngFor="let project of projects">
      <div class="card">
        <img [src]="'http://mogasoft.runasp.net' + project.headImageUrl" class="card-img-top"
          alt="{{ project.titleEN }}">
        <div class="card-body">
          <i class="fa-solid fa-trash" (click)="deleteProject(project.projectId)"></i>
          <h5 class="card-title text-white">{{ project.titleEN }}</h5>
          <p class="card-text text-white-50">Project Type: {{ project.type }}</p>
          <p class="card-text text-white-50">Project Category: {{ project.category }}</p>
          <!-- <i class="fa-solid fa-pen-to-square" routerLink="/admin/project-edit/{{project.id}}"></i> -->
        </div>
      </div>
    </div>
  </div>
</div>
